# Deduplication Configuration
#
# Controls how policies are normalized before comparison.
# Two policies are "duplicates" if their normalized forms hash identically.

# Fields to ignore during comparison (dot-notation paths).
# These are stripped before hashing so differences in them don't matter.
# Add any field that varies across exports but doesn't change policy behavior.
volatile_fields:
  - id
  - createdDateTime
  - modifiedDateTime
  - templateId

# Whether to sort arrays before comparison.
# When true, ["b", "a"] and ["a", "b"] are treated as equal.
# Applies only to arrays of primitives (strings, numbers).
# Arrays of objects are left in original order.
sort_arrays: true

# Comparison modes to run. Each mode produces its own grouping.
#   content  — compare full normalized content (minus volatile fields)
#   id       — group by the "id" field alone (same policy, possibly different versions)
#   fields   — compare only a specific set of fields listed in compare_fields
modes:
  - content
  - id

# Only used when "fields" mode is enabled above.
# Restricts comparison to these dot-notation paths only.
# Useful for checking "do any two policies target the same users + apps?"
compare_fields: []
#  - conditions.users.includeUsers
#  - conditions.users.excludeUsers
#  - conditions.applications.includeApplications
#  - conditions.applications.excludeApplications
#  - grantControls.builtInControls
#  - state
